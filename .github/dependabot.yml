version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      timezone: Europe/Paris
    cooldown:
      default-days: 10
    labels:
      - "3. to review"
      - "dependencies"
      
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Paris
    cooldown:
      default-days: 10
    open-pull-requests-limit: 10
    labels:
      - "3. to review"
      - "dependencies"
